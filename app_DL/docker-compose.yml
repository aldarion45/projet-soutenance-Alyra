services:
  gradio-yolo-v2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gradio-yolo-v2
    ports:
      - "7870:7871"
    environment:
      GRADIO_SERVER_PORT: "7871"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    gpus: all
    restart: unless-stopped
